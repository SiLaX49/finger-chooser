<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" />
    <title>Finger Chooser</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #000;
        color: #fff;
        touch-action: none;
        user-select: none;
      }
      #stage {
        position: fixed;
        inset: 0;
      }

      /* ---- PANEL DE PRESELECTION (secret) ---- */
      #panel {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: radial-gradient(circle at 50% 35%, #16162c, #000 75%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
      }
      #panel h1 {
        font-size: 1.4rem;
        letter-spacing: 1px;
        text-align: center;
        padding: 0 20px;
      }
      #panel p {
        opacity: 0.6;
        font-size: 0.95rem;
        text-align: center;
        max-width: 320px;
        line-height: 1.5;
      }
      .choices {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
        padding: 0 16px;
      }
      .choice {
        width: 74px;
        height: 74px;
        border-radius: 50%;
        border: 3px solid #2e2e55;
        background: #14142a;
        font-size: 1.6rem;
        font-weight: 700;
        color: #fff;
        cursor: pointer;
        transition:
          transform 0.1s,
          border-color 0.2s,
          background 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .choice:active {
        transform: scale(0.93);
      }
      .choice.sel {
        border-color: #16c79a;
        background: #16c79a22;
        color: #16c79a;
      }
      .rand {
        width: auto;
        padding: 0 22px;
        border-radius: 40px;
        font-size: 1rem;
      }
      #go {
        margin-top: 8px;
        padding: 15px 50px;
        font-size: 1.1rem;
        font-weight: 700;
        background: #16c79a;
        color: #06241c;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        letter-spacing: 1px;
      }
      #go:active {
        transform: scale(0.96);
      }
      #go:disabled {
        background: #333;
        color: #777;
        cursor: not-allowed;
      }

      /* ---- ECRAN DE JEU ---- */
      #game {
        position: fixed;
        inset: 0;
        display: none;
      }
      #msg {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        pointer-events: none;
        transition: opacity 0.4s;
        padding: 0 24px;
      }
      #msg .big {
        font-size: 1.5rem;
        font-weight: 700;
        opacity: 0.9;
      }
      #msg .sub {
        font-size: 0.95rem;
        opacity: 0.45;
        margin-top: 10px;
      }
      canvas {
        position: absolute;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <!-- PANEL CACHE : visible seulement par toi avant de lancer -->
      <div id="panel">
        <h1>Choisissez le nombre de joueurs</h1>
        <p>Choisissez quel doigt gagnera (ordre de pose).</p>
        <div class="choices">
          <button class="choice" data-i="0">1</button>
          <button class="choice" data-i="1">2</button>
          <button class="choice" data-i="2">3</button>
          <button class="choice" data-i="3">4</button>
          <button class="choice" data-i="4">5</button>
          <button class="choice rand" data-i="-1">Hasard</button>
        </div>
        <button id="go" disabled>LANCER LE JEU</button>
      </div>

      <!-- JEU OFFICIEL -->
      <div id="game">
        <canvas id="c"></canvas>
        <div id="msg">
          <div class="big">Posez vos doigts</div>
          <div class="sub">Maintenez l'écran…</div>
        </div>
      </div>
    </div>

    <script>
      const PALETTE = [
        "#ff2e63",
        "#08d9d6",
        "#16c79a",
        "#ffd460",
        "#9b5de5",
        "#f15bb5",
        "#fee440",
        "#ff8a5c",
        "#4cd137",
        "#48dbfb",
      ];

      let forcedOrder = null; // index (ordre de pose) forcé, null = hasard

      /* ---------- PANEL ---------- */
      const panel = document.getElementById("panel");
      const goBtn = document.getElementById("go");
      document.querySelectorAll(".choice").forEach((b) => {
        b.addEventListener("click", () => {
          document
            .querySelectorAll(".choice")
            .forEach((x) => x.classList.remove("sel"));
          b.classList.add("sel");
          forcedOrder = parseInt(b.dataset.i, 10);
          if (forcedOrder < 0) forcedOrder = null;
          goBtn.disabled = false;
        });
      });
      goBtn.addEventListener("click", () => {
        panel.style.display = "none";
        document.getElementById("game").style.display = "block";
        resize();
      });

      /* re-réglage discret au clavier pendant le jeu */
      document.addEventListener("keydown", (e) => {
        const n = parseInt(e.key, 10);
        if (!isNaN(n)) {
          if (n === 0) forcedOrder = null;
          else forcedOrder = n - 1;
        }
      });

      /* ---------- JEU ---------- */
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const msg = document.getElementById("msg");
      let DPR = Math.max(1, window.devicePixelRatio || 1);

      function resize() {
        DPR = Math.max(1, window.devicePixelRatio || 1);
        canvas.width = innerWidth * DPR;
        canvas.height = innerHeight * DPR;
        canvas.style.width = innerWidth + "px";
        canvas.style.height = innerHeight + "px";
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      }
      window.addEventListener("resize", resize);

      // touches : Map id -> {x,y,color,bornAt,order}
      const touches = new Map();
      let orderCounter = 0;
      let phase = "waiting"; // waiting | counting | done
      let countdownStart = 0;
      const COUNTDOWN = 3000; // ms après la dernière pose avant sélection
      let winnerId = null;
      let winner = null;
      let revealR = 0;
      let pulse = 0;

      const easeOut = (x) => 1 - Math.pow(1 - x, 3);
      const colorFor = (order) => PALETTE[order % PALETTE.length];

      canvas.addEventListener(
        "touchstart",
        (e) => {
          e.preventDefault();
          for (const t of e.changedTouches) {
            touches.set(t.identifier, {
              x: t.clientX,
              y: t.clientY,
              order: orderCounter++,
              color: colorFor(orderCounter - 1),
              bornAt: performance.now(),
            });
          }
          if (phase !== "done") {
            phase = "counting";
            countdownStart = performance.now();
            msg.style.opacity = "0";
          }
        },
        { passive: false },
      );

      canvas.addEventListener(
        "touchmove",
        (e) => {
          e.preventDefault();
          for (const t of e.changedTouches) {
            const o = touches.get(t.identifier);
            if (o) {
              o.x = t.clientX;
              o.y = t.clientY;
            }
          }
        },
        { passive: false },
      );

      function removeTouch(e) {
        e.preventDefault();
        for (const t of e.changedTouches) {
          touches.delete(t.identifier);
        }
        if (touches.size === 0) {
          resetRound();
        } else if (phase === "counting") {
          countdownStart = performance.now(); // relance le compte si on rajuste
        }
      }
      canvas.addEventListener("touchend", removeTouch, { passive: false });
      canvas.addEventListener("touchcancel", removeTouch, { passive: false });

      function resetRound() {
        phase = "waiting";
        winnerId = null;
        winner = null;
        revealR = 0;
        orderCounter = 0;
        msg.querySelector(".big").textContent = "Posez vos doigts";
        msg.querySelector(".sub").textContent = "Maintenez l'écran…";
        msg.style.opacity = "1";
      }

      function pickWinner() {
        const arr = [...touches.values()].sort((a, b) => a.order - b.order);
        if (arr.length === 0) return null;
        let chosen;
        if (forcedOrder !== null && forcedOrder >= 0 && forcedOrder < arr.length) {
          chosen = arr[forcedOrder]; // doigt truqué selon l'ordre de pose
        } else {
          chosen = arr[Math.floor(Math.random() * arr.length)]; // vrai hasard
        }
        for (const [id, o] of touches) {
          if (o === chosen) return id;
        }
        return null;
      }

      /* ---------- RENDU (style Chwazi) ---------- */
      function drawFinger(o, now, progress, ph) {
        const t = now / 1000;
        const grow = easeOut(Math.min(1, (now - o.bornAt) / 220));
        const cx = o.x,
          cy = o.y;
        const speed = ph === "counting" ? 2.4 : 1.1;

        ctx.lineCap = "round";
        ctx.strokeStyle = o.color;

        // anneaux concentriques en rotation
        const rings = [26, 40, 54];
        rings.forEach((baseR, idx) => {
          const rr = baseR * grow;
          const dir = idx % 2 === 0 ? 1 : -1;
          const rot = t * speed * dir + o.order * 1.3;
          const segs = 3;
          ctx.lineWidth = 4;
          for (let s = 0; s < segs; s++) {
            const a0 = rot + (s * Math.PI * 2) / segs;
            const a1 = a0 + ((Math.PI * 2) / segs) * 0.55;
            ctx.beginPath();
            ctx.arc(cx, cy, rr, a0, a1);
            ctx.stroke();
          }
        });

        // anneau de décompte qui se remplit
        if (ph === "counting") {
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.arc(
            cx,
            cy,
            66 * grow,
            -Math.PI / 2,
            -Math.PI / 2 + Math.PI * 2 * progress,
          );
          ctx.stroke();
        }

        // point central
        ctx.fillStyle = o.color;
        ctx.beginPath();
        ctx.arc(cx, cy, 12 * grow, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawWinnerMark(o, now) {
        const t = now / 1000;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#ffffff";
        [30, 50].forEach((rr, idx) => {
          const dir = idx % 2 === 0 ? 1 : -1;
          const rot = t * 2 * dir;
          for (let s = 0; s < 3; s++) {
            const a0 = rot + (s * Math.PI * 2) / 3;
            const a1 = a0 + ((Math.PI * 2) / 3) * 0.55;
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(o.x, o.y, rr, a0, a1);
            ctx.stroke();
          }
        });
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(o.x, o.y, 16, 0, Math.PI * 2);
        ctx.fill();
      }

      function frame(now) {
        ctx.clearRect(0, 0, innerWidth, innerHeight);
        pulse += 0.05;

        if (phase === "counting") {
          const elapsed = now - countdownStart;
          if (elapsed >= COUNTDOWN && touches.size > 0) {
            winnerId = pickWinner();
            winner = touches.get(winnerId);
            revealR = 24;
            phase = "done";
            msg.style.opacity = "0";
          }
        }

        const progress =
          phase === "counting"
            ? Math.min(1, (now - countdownStart) / COUNTDOWN)
            : 0;

        // tous les doigts (le gagnant sera redessiné par-dessus l'inondation)
        for (const [id, o] of touches) {
          if (phase === "done" && id === winnerId) continue;
          drawFinger(o, now, progress, phase);
        }

        // inondation de la couleur du gagnant
        if (phase === "done" && winner) {
          const maxR = Math.hypot(innerWidth, innerHeight) + 80;
          revealR += (maxR - revealR) * 0.12;
          ctx.fillStyle = winner.color;
          ctx.beginPath();
          ctx.arc(winner.x, winner.y, revealR, 0, Math.PI * 2);
          ctx.fill();
          drawWinnerMark(winner, now);
        }

        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
